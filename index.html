<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>z0pus lab</title>
<meta name="description" content="z0pus-lab — staging, preview, and review for active projects.">
<meta property="og:title" content="z0pus lab">
<meta property="og:description" content="staging · preview · review">
<meta property="og:url" content="https://z0pus-lab.dev">
<meta property="og:type" content="website">
<link rel="canonical" href="https://z0pus-lab.dev">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0a0b'/%3E%3Ctext x='4' y='23' font-family='monospace' font-weight='700' font-size='18' fill='%23c9a55a'%3Ez0%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060a;
    --bg2: #0c0c12;
    --bg3: #14141c;
    --surface: #1a1a24;
    --border: #1e1e2a;
    --border-hover: #2a2a3a;
    --text: #e8e6e1;
    --text-dim: #8a8894;
    --text-muted: #55556a;
    --accent: #c9a55a;
    --accent-dim: #8a7340;
    --accent-glow: rgba(201, 165, 90, 0.06);
    --accent-bright: #e0be6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- Noise overlay --- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* --- Dot grid background --- */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
  }

  /* --- Mouse glow --- */
  .cursor-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201, 165, 90, 0.04) 0%, transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 1;
    transition: opacity 0.3s;
    opacity: 0;
  }

  .cursor-glow.active { opacity: 1; }

  /* --- Nav --- */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, var(--bg) 0%, rgba(6,6,10,0.8) 60%, transparent 100%);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .nav-logo-mark {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .nav-logo-mark .z { color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; letter-spacing: 1px; }
  .nav-logo-mark .zero { color: var(--accent); font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; }
  .nav-logo-mark .rest { color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 300; letter-spacing: 1px; }

  .nav-divider {
    width: 1px;
    height: 16px;
    background: var(--border);
  }

  .nav-lab {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .nav-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* --- Hero --- */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 48px;
  }

  /* --- Logo mark: particle canvas --- */
  .logo-mark {
    position: relative;
    animation: logoIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .logo-canvas {
    width: clamp(240px, 32vw, 400px);
    height: clamp(140px, 18vw, 230px);
    cursor: default;
  }

  @keyframes logoIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .hero-wordmark {
    font-family: 'DM Mono', monospace;
    font-size: clamp(14px, 2.5vw, 22px);
    letter-spacing: 14px;
    color: var(--text-dim);
    margin-top: 32px;
    font-weight: 300;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
  }

  .hero-wordmark .accent { color: var(--accent); font-weight: 500; }

  .hero-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 24px;
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
  }

  .divider-line {
    width: 1px;
    height: 80px;
    background: linear-gradient(180deg, var(--accent-dim), transparent);
    margin-top: 60px;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.8s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- Scroll indicator --- */
  .scroll-hint {
    position: absolute;
    bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.2s both;
  }

  .scroll-hint span {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .scroll-arrow {
    width: 16px;
    height: 16px;
    border-right: 1px solid var(--text-muted);
    border-bottom: 1px solid var(--text-muted);
    transform: rotate(45deg);
    animation: scrollBounce 2s ease-in-out infinite;
  }

  @keyframes scrollBounce {
    0%, 100% { transform: rotate(45deg) translateY(0); opacity: 0.5; }
    50% { transform: rotate(45deg) translateY(6px); opacity: 1; }
  }

  /* --- Projects section --- */
  .section {
    padding: 100px 48px;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 48px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* --- Project cards --- */
  .project-card {
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 16px;
    background: var(--bg2);
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 24px;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
  }

  .project-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(201, 165, 90, 0.04), transparent 40%);
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }

  .project-card:hover::before { opacity: 1; }

  .project-card:hover {
    border-color: var(--border-hover);
    background: var(--bg3);
    transform: translateY(-3px);
    box-shadow: 0 12px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(201, 165, 90, 0.1);
  }

  .project-card-delivered {
    opacity: 0.55;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .project-card-delivered:hover {
    opacity: 0.8;
  }

  .project-name {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    transition: color 0.3s;
  }

  .project-card:hover .project-name { color: var(--accent-bright); }

  .project-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 20px;
    letter-spacing: 0.5px;
  }

  .project-meta span { display: flex; align-items: center; gap: 6px; }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid;
    white-space: nowrap;
    transition: all 0.3s;
  }

  .badge-live {
    color: #4ade80;
    border-color: rgba(74, 222, 128, 0.2);
    background: rgba(74, 222, 128, 0.05);
  }

  .badge-delivered {
    color: #60a5fa;
    border-color: rgba(96, 165, 250, 0.2);
    background: rgba(96, 165, 250, 0.05);
  }

  .project-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .arrow-icon {
    width: 20px;
    height: 20px;
    color: var(--text-muted);
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .project-card:hover .arrow-icon {
    color: var(--accent);
    transform: translateX(6px);
  }

  /* --- Footer --- */
  footer {
    padding: 60px 48px;
    max-width: 900px;
    margin: 0 auto;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  /* --- Animations on scroll --- */
  .fade-in {
    opacity: 0;
    transform: translateY(24px);
    transition: all 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .fade-in.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* --- Responsive --- */
  @media (max-width: 640px) {
    nav { padding: 20px 24px; }
    .nav-lab { display: none; }
    .nav-divider { display: none; }
    .hero { padding: 0 24px; }
    .section { padding: 60px 24px; }
    footer { padding: 40px 24px; }
    .hero-wordmark { letter-spacing: 8px; }
    .project-card { grid-template-columns: 1fr; padding: 24px; border-radius: 12px; }
    .project-card .badge { justify-self: start; }
    .scroll-hint { display: none; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<nav>
  <div class="nav-brand">
    <div class="nav-logo-mark">
      <span class="z">Z</span><span class="zero">0</span><span class="rest">PUS</span>
    </div>

  </div>

    systems operational
  </div>
</nav>

<section class="hero">
  <div class="logo-mark">
    <canvas class="logo-canvas" id="logoCanvas"></canvas>
  </div>

  <div class="hero-wordmark">z<span class="accent">0</span>pus</div>
  <div class="hero-sub">staging · preview · review</div>

  <div class="scroll-hint">
    <span>scroll</span>

  </div>
</section>

<section class="section">
  <div class="section-label fade-in">In development</div>

  <a href="https://narthex.z0pus-lab.dev" target="_blank" rel="noopener" class="project-card fade-in">
    <div>
      <div class="project-name">Narthex Dental</div>

    <div class="project-right">

      <svg class="arrow-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 10h12M12 6l4 4-4 4"/></svg>
    </div>

  <a href="https://troisroues.org" target="_blank" rel="noopener" class="project-card fade-in">
    <div>

    </div>
    <div class="project-right">
      <span class="badge badge-live">Live</span>
      <svg class="arrow-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 10h12M12 6l4 4-4 4"/></svg>

<section class="section" style="padding-top: 20px;">

  <a href="https://ryoku.xyz" target="_blank" rel="noopener" class="project-card project-card-delivered fade-in">

      </div>

      <svg class="arrow-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 10h12M12 6l4 4-4 4"/></svg>
    </div>
  </a>
</section>

<footer>
  <div class="footer-text">z0pus-lab.dev — MMXXVI</div>
</footer>

<script>
  // --- Intersection Observer for fade-in ---
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 100);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

  // --- Cursor glow follow ---
  const glow = document.getElementById('cursorGlow');
  let glowActive = false;

  document.addEventListener('mousemove', (e) => {
    if (!glowActive) {
      glow.classList.add('active');
      glowActive = true;
    }
    requestAnimationFrame(() => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });
  });

  document.addEventListener('mouseleave', () => {
    glow.classList.remove('active');
    glowActive = false;
  });

  // --- Card spotlight effect ---
  document.querySelectorAll('.project-card').forEach(card => {
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      card.style.setProperty('--mouse-x', x + '%');
      card.style.setProperty('--mouse-y', y + '%');
    });
  });

  // --- Smooth parallax on hero ---
  const hero = document.querySelector('.hero');
  const logoMark = document.querySelector('.logo-mark');

  window.addEventListener('scroll', () => {
    const scrolled = window.scrollY;
    const heroHeight = hero.offsetHeight;
    if (scrolled < heroHeight) {
      const progress = scrolled / heroHeight;
      logoMark.style.transform = `translateY(${scrolled * 0.15}px) scale(${1 - progress * 0.1})`;
      logoMark.style.opacity = 1 - progress * 1.2;
    }
  }, { passive: true });

  // --- Interactive particle logo ---
  (function() {
    const canvas = document.getElementById('logoCanvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
    }
    resize();
    window.addEventListener('resize', resize);

    const accent = { r: 201, g: 165, b: 90 };
    const particles = [];
    const mouse = { x: -9999, y: -9999, active: false };
    const MOUSE_RADIUS = 80;
    const RETURN_SPEED = 0.04;
    const FRICTION = 0.88;
    let time = 0;

    // Sample text "z0" to get target positions
    function sampleText() {
      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      const offscreen = document.createElement('canvas');
      offscreen.width = w;
      offscreen.height = h;
      const offCtx = offscreen.getContext('2d');

      const fontSize = Math.floor(w * 0.38);
      offCtx.fillStyle = '#fff';
      offCtx.font = `600 ${fontSize}px "DM Mono", monospace`;
      offCtx.textAlign = 'center';
      offCtx.textBaseline = 'middle';
      offCtx.fillText('z0', w / 2, h / 2);

      const imageData = offCtx.getImageData(0, 0, w, h);
      const points = [];
      const gap = 4;

      for (let y = 0; y < h; y += gap) {
        for (let x = 0; x < w; x += gap) {
          const i = (y * w + x) * 4;
          if (imageData.data[i + 3] > 128) {
            points.push({ x, y });
          }
        }
      }
      return points;
    }

    function initParticles() {
      particles.length = 0;
      const targets = sampleText();
      const rect = canvas.getBoundingClientRect();
      const cx = rect.width / 2;
      const cy = rect.height / 2;

      targets.forEach((t, i) => {
        const angle = Math.random() * Math.PI * 2;
        const dist = 150 + Math.random() * 200;
        particles.push({
          x: cx + Math.cos(angle) * dist,
          y: cy + Math.sin(angle) * dist,
          tx: t.x,
          ty: t.y,
          vx: 0,
          vy: 0,
          size: 1.2 + Math.random() * 0.8,
          phase: Math.random() * Math.PI * 2,
          speed: 0.5 + Math.random() * 1.5,
          settled: false,
          delay: i * 0.15
        });
      });
    }

    // Wait for fonts to load
    document.fonts.ready.then(() => {
      initParticles();
      animate();
    });

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
      mouse.active = true;
    });

    canvas.addEventListener('mouseleave', () => {
      mouse.active = false;
      mouse.x = -9999;
      mouse.y = -9999;
    });

    function animate() {
      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      ctx.clearRect(0, 0, w, h);

      time += 0.016;

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        // Intro animation
        const introProgress = Math.min(1, Math.max(0, (time * 1000 - p.delay) / 1200));
        const ease = 1 - Math.pow(1 - introProgress, 3);

        // Ambient floating
        const floatX = Math.sin(time * p.speed + p.phase) * 1.5;
        const floatY = Math.cos(time * p.speed * 0.7 + p.phase) * 1.5;

        // Target with float
        const targetX = p.tx + floatX;
        const targetY = p.ty + floatY;

        // Mouse repulsion
        if (mouse.active) {
          const dx = p.x - mouse.x;
          const dy = p.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < MOUSE_RADIUS) {
            const force = (1 - dist / MOUSE_RADIUS) * 8;
            p.vx += (dx / dist) * force;
            p.vy += (dy / dist) * force;
          }
        }

        // Spring back to target
        p.vx += (targetX - p.x) * RETURN_SPEED;
        p.vy += (targetY - p.y) * RETURN_SPEED;

        // Apply friction
        p.vx *= FRICTION;
        p.vy *= FRICTION;

        // Integrate with intro lerp
        if (introProgress < 1) {
          const startX = w / 2 + Math.cos(p.phase) * 200;
          const startY = h / 2 + Math.sin(p.phase) * 200;
          p.x = startX + (targetX - startX) * ease + p.vx;
          p.y = startY + (targetY - startY) * ease + p.vy;
        } else {
          p.x += p.vx;
          p.y += p.vy;
        }

        // Distance from target for glow intensity
        const distToTarget = Math.sqrt((p.x - targetX) ** 2 + (p.y - targetY) ** 2);
        const glowAlpha = Math.min(1, distToTarget / 40) * 0.3;

        // Draw particle
        const alpha = 0.5 + ease * 0.5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${accent.r}, ${accent.g}, ${accent.b}, ${alpha})`;
        ctx.fill();

        // Glow when displaced
        if (glowAlpha > 0.05) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${accent.r}, ${accent.g}, ${accent.b}, ${glowAlpha})`;
          ctx.fill();
        }
      }

      // Draw connecting lines between nearby particles (subtle)
      if (mouse.active) {
        for (let i = 0; i < particles.length; i++) {
          const a = particles[i];
          const dxM = a.x - mouse.x;
          const dyM = a.y - mouse.y;
          const distM = Math.sqrt(dxM * dxM + dyM * dyM);
          if (distM < MOUSE_RADIUS * 1.5) {
            for (let j = i + 1; j < particles.length; j++) {
              const b = particles[j];
              const dx = a.x - b.x;
              const dy = a.y - b.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 20) {
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.strokeStyle = `rgba(${accent.r}, ${accent.g}, ${accent.b}, ${0.1 * (1 - dist / 20)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
              }
            }
          }
        }
      }

      requestAnimationFrame(animate);
    }

    // Re-init on resize
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        resize();
        time = 0;
        initParticles();
      }, 200);
    });
  })();
</script>

</body>
