<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>z0pus — lab</title>
<meta name="description" content="z0pus-lab — staging, preview, and review for active projects.">
<meta property="og:title" content="z0pus — lab">
<meta property="og:description" content="staging · preview · review">
<meta property="og:url" content="https://z0pus-lab.dev">
<meta property="og:type" content="website">
<link rel="canonical" href="https://z0pus-lab.dev">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg2: #111113;
    --bg3: #1a1a1d;
    --surface: #222226;
    --border: #2a2a2f;
    --text: #e8e6e1;
    --text-dim: #8a8884;
    --text-muted: #5a5a58;
    --accent: #c9a55a;
    --accent-dim: #8a7340;
    --accent-glow: rgba(201, 165, 90, 0.08);
    --omega: #d4b06a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- Noise overlay --- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* --- Grid background --- */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }

  /* --- Nav --- */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, var(--bg) 0%, transparent 100%);
    backdrop-filter: blur(12px);
  }

  .nav-logo {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .nav-logo span { color: var(--omega); font-weight: 500; }

  .nav-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .nav-status::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* --- Hero --- */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 48px;
  }

  .omega-mark {
    font-size: clamp(160px, 22vw, 280px);
    font-family: 'Instrument Serif', serif;
    color: var(--omega);
    line-height: 1;
    position: relative;
    user-select: none;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .omega-mark::after {
    content: 'Ω';
    position: absolute;
    inset: 0;
    color: transparent;
    text-shadow: 0 0 120px rgba(201, 165, 90, 0.15);
    pointer-events: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-wordmark {
    font-family: 'DM Mono', monospace;
    font-size: clamp(18px, 3vw, 28px);
    letter-spacing: 12px;
    color: var(--text-dim);
    margin-top: -10px;
    font-weight: 300;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
  }

  .hero-sub {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 40px;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
  }

  .divider-line {
    width: 1px;
    height: 80px;
    background: linear-gradient(180deg, var(--accent-dim), transparent);
    margin-top: 60px;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.45s both;
  }

  /* --- Projects section --- */
  .section {
    padding: 100px 48px;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 48px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* --- Project cards --- */
  .project-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 16px;
    background: var(--bg2);
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 24px;
    transition: all 0.3s ease;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }

  .project-card:hover {
    border-color: var(--accent-dim);
    background: var(--bg3);
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 0 1px var(--accent-dim);
  }

  .project-card-archived {
    opacity: 0.5;
    transition: all 0.3s ease;
  }

  .project-card-archived:hover {
    opacity: 0.75;
  }

  .project-name {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .project-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 20px;
    letter-spacing: 0.5px;
  }

  .project-meta span { display: flex; align-items: center; gap: 6px; }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid;
    white-space: nowrap;
  }

  .badge-live { color: #4ade80; border-color: rgba(74, 222, 128, 0.25); background: rgba(74, 222, 128, 0.06); }
  .badge-closed { color: var(--text-muted); border-color: var(--border); background: rgba(255,255,255,0.02); }

  .project-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .arrow-icon {
    width: 20px;
    height: 20px;
    color: var(--text-muted);
    transition: all 0.3s;
  }

  .project-card:hover .arrow-icon {
    color: var(--accent);
    transform: translateX(4px);
  }

  /* --- Footer --- */
  footer {
    padding: 60px 48px;
    max-width: 900px;
    margin: 0 auto;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  /* --- Animations on scroll --- */
  .fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .fade-in.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* --- Responsive --- */
  @media (max-width: 640px) {
    nav { padding: 20px 24px; }
    .hero { padding: 0 24px; }
    .section { padding: 60px 24px; }
    footer { padding: 40px 24px; }
    .hero-wordmark { letter-spacing: 6px; }
    .project-card { grid-template-columns: 1fr; padding: 24px; }
    .project-card .badge { justify-self: start; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>

<nav>
  <div class="nav-logo">z<span>0</span>pus · lab</div>
  <div class="nav-status">systems operational</div>
</nav>

<section class="hero">
  <div class="omega-mark">Ω</div>
  <div class="hero-wordmark">z0pus — lab</div>
  <div class="hero-sub">staging · preview · review</div>
  <div class="divider-line"></div>
</section>

<section class="section">
  <div class="section-label fade-in">Active projects</div>

  <a href="https://narthex.z0pus-lab.dev" target="_blank" rel="noopener" class="project-card fade-in">
    <div>
      <div class="project-name">Narthex</div>
      <div class="project-meta">
        <span>narthex.z0pus-lab.dev</span>
      </div>
    </div>
    <div class="project-right">
      <span class="badge badge-live">Live</span>
      <svg class="arrow-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 10h12M12 6l4 4-4 4"/></svg>
    </div>
  </a>

  <a href="https://troisroues.org" target="_blank" rel="noopener" class="project-card fade-in">
    <div>
      <div class="project-name">Trois Roues</div>
      <div class="project-meta">
        <span>troisroues.org</span>
      </div>
    </div>
    <div class="project-right">
      <span class="badge badge-live">Live</span>
      <svg class="arrow-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 10h12M12 6l4 4-4 4"/></svg>
    </div>
  </a>
</section>

<section class="section" style="padding-top: 20px;">
  <div class="section-label fade-in">Archived</div>

  <a href="https://ryoku.xyz" target="_blank" rel="noopener" class="project-card project-card-archived fade-in">
    <div>
      <div class="project-name">Ryoku</div>
      <div class="project-meta">
        <span>ryoku.xyz</span>
      </div>
    </div>
    <div class="project-right">
      <span class="badge badge-closed">Closed</span>
      <svg class="arrow-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 10h12M12 6l4 4-4 4"/></svg>
    </div>
  </a>
</section>

<footer>
  <div class="footer-text">z0pus-lab.dev — MMXXVI</div>
</footer>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 80);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>

</body>
</html>
